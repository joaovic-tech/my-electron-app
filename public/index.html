<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Ollama</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#ecfdf5',
              100: '#d1fae5',
              200: '#a7f3d0',
              300: '#6ee7b7',
              400: '#34d399',
              500: '#10b981',
              600: '#059669',
              700: '#047857',
              800: '#065f46',
              900: '#064e3b',
              950: '#022c22',
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      height: 100%; 
      overflow: hidden;
      background: transparent !important;
    }

    body { font-family: 'DM Sans', system-ui, sans-serif; }

    /* ── Custom title bar drag region ── */
    .titlebar {
      -webkit-app-region: drag;
      app-region: drag;
    }
    .titlebar button {
      -webkit-app-region: no-drag;
      app-region: no-drag;
    }

    /* ── Glassmorphism container ── */
    .glass-container {
      background: rgba(10, 10, 12, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03),
        0 8px 32px rgba(0, 0, 0, 0.5),
        0 2px 8px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    /* ── Floating animation ── */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .float-animation { animation: float 4s ease-in-out infinite; }

    /* ── Glow effect on logo ── */
    .logo-glow {
      box-shadow:
        0 0 20px rgba(16, 185, 129, 0.25),
        0 0 60px rgba(16, 185, 129, 0.1);
    }

    /* ── Mic pulse animation ── */
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .mic-recording .pulse-ring {
      animation: pulse-ring 1.2s ease-out infinite;
    }

    /* ── Fade-in ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    .fade-in { animation: fadeIn 0.25s ease-out; }

    /* ── Input glow ── */
    .input-glow:focus-within {
      border-color: rgba(16, 185, 129, 0.35);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.08), 0 0 20px rgba(16, 185, 129, 0.06);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* ── Subtle noise texture ── */
    .noise::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      opacity: 0.015;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ── Light reflection at top ── */
    .glass-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      border-radius: 16px 16px 0 0;
    }

    /* ── Thinking dots ── */
    @keyframes thinking {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    .thinking-dot:nth-child(1) { animation: thinking 1.4s infinite 0s; }
    .thinking-dot:nth-child(2) { animation: thinking 1.4s infinite 0.2s; }
    .thinking-dot:nth-child(3) { animation: thinking 1.4s infinite 0.4s; }

    /* ── Response area ── */
    .response-text {
      line-height: 1.7;
      word-wrap: break-word;
    }
    .response-text p { margin-bottom: 0.5em; }
    .response-text code {
      background: rgba(255,255,255,0.06);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .response-text pre {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 0.75em 1em;
      overflow-x: auto;
      margin: 0.5em 0;
    }
    .response-text pre code {
      background: none;
      padding: 0;
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .float-animation { animation: none; }
      .mic-recording .pulse-ring { animation: none; }
      .fade-in { animation: none; }
      .thinking-dot { animation: none !important; }
    }
  </style>
</head>
<body class="text-white h-screen flex items-center justify-center" style="background: transparent;">

  <!-- Glass window -->
  <div class="glass-container noise relative w-full h-full flex flex-col overflow-hidden">

    <!-- ── Custom title bar ── -->
    <div class="titlebar flex items-center justify-between px-4 py-2.5 shrink-0">
      <div class="flex items-center gap-2">
        <div class="w-5 h-5 rounded-md bg-gradient-to-br from-primary-400 to-primary-600 flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
          </svg>
        </div>
        <span class="text-[11px] font-medium text-white/50 tracking-wide uppercase">AI Ollama</span>
      </div>
      <!-- Window controls -->
      <div class="flex items-center gap-1">
        <button id="minimizeBtn" class="w-6 h-6 rounded-md flex items-center justify-center text-white/30 hover:text-white/70 hover:bg-white/5 transition-all duration-200 cursor-pointer" title="Minimizar">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" d="M5 12h14" />
          </svg>
        </button>
        <button id="maximizeBtn" class="w-6 h-6 rounded-md flex items-center justify-center text-white/30 hover:text-white/70 hover:bg-white/5 transition-all duration-200 cursor-pointer" title="Maximizar">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="4" y="4" width="16" height="16" rx="2" />
          </svg>
        </button>
        <button id="closeBtn" class="w-6 h-6 rounded-md flex items-center justify-center text-white/30 hover:text-red-400 hover:bg-red-400/10 transition-all duration-200 cursor-pointer" title="Fechar">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- ── Divider ── -->
    <div class="h-px bg-white/[0.04] mx-3"></div>

    <!-- ── Content area ── -->
    <div id="contentArea" class="flex-1 flex flex-col overflow-hidden">

      <!-- Branding (shown when idle) -->
      <div id="branding" class="flex-1 flex items-center justify-center px-6">
        <div class="flex flex-col items-center gap-4">
          <div class="float-animation">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-400 via-primary-500 to-primary-700 flex items-center justify-center logo-glow">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 0 0-2.455 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z" />
              </svg>
            </div>
          </div>
          <div class="text-center">
            <h1 class="text-xl font-semibold tracking-tight" style="font-family: 'Space Grotesk', sans-serif;">
              AI <span class="text-primary-400">Ollama</span>
            </h1>
            <p class="text-[13px] text-white/30 mt-1.5">
              Pergunte ou use o microfone
            </p>
          </div>
        </div>
      </div>

      <!-- Response area (hidden initially) -->
      <div id="responseArea" class="hidden flex-1 overflow-y-auto px-4 py-3">
        <!-- User message -->
        <div id="userMessage" class="mb-3">
          <div class="flex items-start gap-2.5">
            <div class="w-6 h-6 rounded-lg bg-white/[0.06] flex items-center justify-center shrink-0 mt-0.5">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-white/40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
              </svg>
            </div>
            <p id="userMessageText" class="text-sm text-white/70 pt-0.5"></p>
          </div>
        </div>

        <!-- AI response -->
        <div id="aiResponse" class="mb-3">
          <div class="flex items-start gap-2.5">
            <div class="w-6 h-6 rounded-lg bg-gradient-to-br from-primary-500/20 to-primary-600/20 flex items-center justify-center shrink-0 mt-0.5">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-primary-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <!-- Thinking indicator -->
              <div id="thinkingIndicator" class="flex items-center gap-1 py-1.5 hidden">
                <span class="thinking-dot w-1.5 h-1.5 rounded-full bg-primary-400"></span>
                <span class="thinking-dot w-1.5 h-1.5 rounded-full bg-primary-400"></span>
                <span class="thinking-dot w-1.5 h-1.5 rounded-full bg-primary-400"></span>
              </div>
              <!-- Response text -->
              <div id="responseText" class="response-text text-sm text-white/80"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Input area ── -->
    <div class="p-3 pb-4 shrink-0">
      <!-- Error message -->
      <div id="errorMsg" class="hidden mb-2 px-3 py-2 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-xs">
        <span id="errorText"></span>
      </div>

      <div class="relative bg-white/[0.04] rounded-xl border border-white/[0.06] input-glow transition-all duration-300">
        <textarea
          id="userInput"
          rows="1"
          placeholder="Escreva sua mensagem..."
          class="w-full bg-transparent text-white/90 placeholder-white/20 px-4 py-3 pr-[5.5rem] resize-none outline-none text-sm leading-relaxed max-h-28 overflow-y-auto rounded-xl"
        ></textarea>

        <!-- Action buttons -->
        <div class="absolute right-1.5 bottom-1.5 flex items-center gap-1">
          <!-- Mic button -->
          <button
            id="micBtn"
            title="Gravar áudio"
            class="relative w-8 h-8 flex items-center justify-center rounded-lg text-white/30 hover:text-primary-400 hover:bg-white/[0.06] transition-all duration-200 cursor-pointer"
          >
            <div class="pulse-ring absolute inset-0 rounded-lg bg-primary-500 hidden"></div>
            <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 relative z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
            </svg>
            <svg id="stopIcon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 relative z-10 hidden" fill="currentColor" viewBox="0 0 24 24">
              <rect x="6" y="6" width="12" height="12" rx="2" />
            </svg>
          </button>

          <!-- Send button -->
          <button
            id="sendBtn"
            title="Enviar"
            class="w-8 h-8 flex items-center justify-center rounded-lg bg-primary-500 text-white hover:bg-primary-400 transition-all duration-200 hidden cursor-pointer shadow-lg shadow-primary-500/20"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Recording indicator -->
      <div id="recordingIndicator" class="hidden mt-2 flex items-center justify-center gap-2 text-[11px] text-primary-400/80">
        <span class="w-1.5 h-1.5 rounded-full bg-primary-500 animate-pulse"></span>
        Ouvindo...
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
